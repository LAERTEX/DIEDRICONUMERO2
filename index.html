<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>AR con Hiro - diedrico2</title>

  <!-- AR.js + A-Frame (incluye Three.js automáticamente) -->
  <script src="https://cdn.jsdelivr.net/npm/ar.js@3.3.2/aframe/build/aframe-ar.js"></script>

</head>

<body style="margin:0; overflow:hidden;">

  <a-scene 
    embedded 
    arjs="sourceType: webcam; debugUIEnabled: false;"
  >

    <!-- Marcador Hiro -->
    <a-marker preset="hiro">
      
      <!-- Modelo 3D -->
      <a-entity
        gltf-model="diedrico2.glb"
        scale="0.5 0.5 0.5"
        position="0 0 0"
        rotation="0 0 0">
      </a-entity>

    </a-marker>

    <!-- Cámara -->
    <a-entity camera></a-entity>

  </a-scene>

</body>
</html>
